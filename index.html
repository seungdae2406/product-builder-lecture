<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>랜덤 숫자 뽑기</title>
    <link rel="stylesheet" href="style.css">
    <meta name="google-adsense-account" content="ca-pub-2725549586732977">
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-2725549586732977"
     crossorigin="anonymous"></script>
</head>
<body>
    <div class="container">
        <button id="theme-toggle" class="theme-btn">다크 모드</button>
        <h1>1 ~ 100 랜덤 숫자 뽑기</h1>
        <div id="number-display" class="number">-</div>
        <button id="pick-btn" class="main-btn">숫자 뽑기</button>
        <button id="reset-btn" class="sub-btn">초기화</button>
        <div id="history" class="history-list">
            <h3>뽑은 숫자 목록</h3>
            <ul id="numbers-ul"></ul>
        </div>

        <div class="contact-section">
            <h3>제휴 문의</h3>
            <form action="https://formspree.io/f/xreyeoqd" method="POST" class="contact-form">
                <input type="text" name="name" placeholder="성함/업체명" required>
                <input type="email" name="_replyto" placeholder="이메일 주소" required>
                <textarea name="message" placeholder="문의 내용을 입력해주세요" required></textarea>
                <button type="submit" class="main-btn">문의 보내기</button>
            </form>
        </div>

        <div id="disqus_section" style="margin-top: 3rem; border-top: 1px solid var(--border-color); padding-top: 1.5rem;">
            <h3>댓글</h3>
            <div id="disqus_thread"></div>
            <script>
                /**
                *  RECOMMENDED CONFIGURATION VARIABLES: EDIT AND UNCOMMENT THE SECTION BELOW TO INSERT DYNAMIC VALUES FROM YOUR PLATFORM OR CMS.
                *  LEARN WHY DEFINING THESE VARIABLES IS IMPORTANT: https://disqus.com/admin/universalcode/#configuration-variables    */

                var disqus_config = function () {
                this.page.url = PAGE_URL;  // Replace PAGE_URL with your page's canonical URL variable
                this.page.identifier = PAGE_IDENTIFIER; // Replace PAGE_IDENTIFIER with your page's unique identifier variable
                };
                */
                (function() { // DON'T EDIT BELOW THIS LINE
                var d = document, s = d.createElement('script');
                s.src = 'https://productbuilder-kysabatj51.disqus.com/embed.js';
                s.setAttribute('data-timestamp', +new Date());
                (d.head || d.body).appendChild(s);
                })();
            </script>
            <noscript>Please enable JavaScript to view the <a href="https://disqus.com/?ref_noscript">comments powered by Disqus.</a></noscript>
        </div>
    </div>
    <script src="main.js"></script>
</body>
</html>
