<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>랜덤 숫자 뽑기</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <button id="theme-toggle" class="theme-btn">다크 모드</button>
        <h1>1 ~ 100 랜덤 숫자 뽑기</h1>
        <div id="number-display" class="number">-</div>
        <button id="pick-btn" class="main-btn">숫자 뽑기</button>
        <button id="reset-btn" class="sub-btn">초기화</button>
        <div id="history" class="history-list">
            <h3>뽑은 숫자 목록</h3>
            <ul id="numbers-ul"></ul>
        </div>

        <div class="contact-section">
            <h3>제휴 문의</h3>
            <form action="https://formspree.io/f/xreyeoqd" method="POST" class="contact-form">
                <input type="text" name="name" placeholder="성함/업체명" required>
                <input type="email" name="_replyto" placeholder="이메일 주소" required>
                <textarea name="message" placeholder="문의 내용을 입력해주세요" required></textarea>
                <button type="submit" class="main-btn">문의 보내기</button>
            </form>
        </div>
    </div>
    <script src="main.js"></script>
</body>
</html>
